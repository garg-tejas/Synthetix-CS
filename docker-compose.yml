version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: corecs-db
    environment:
      POSTGRES_USER: csrag
      POSTGRES_PASSWORD: csrag
      POSTGRES_DB: cs_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csrag -d cs_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: corecs-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://csrag:csrag@db:5432/cs_rag
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      HF_ROUTER_API_KEY: ${HF_ROUTER_API_KEY}
      HF_ROUTER_MODEL: ${HF_ROUTER_MODEL}
      HF_ROUTER_BASE_URL: ${HF_ROUTER_BASE_URL}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: corecs-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    volumes:
      - ./frontend:/app:ro
    command: >
      sh -c "pnpm install && pnpm dev --host"

volumes:
  pgdata:
